# ─────────────────────────────────────────────────────
# Cloudflare Pages Configuration
# ─────────────────────────────────────────────────────
#
# ⚠️  CRITICAL: Without `pages_build_output_dir`, Cloudflare Pages
#     IGNORES THIS ENTIRE FILE — including all bindings below.
#     This was the root cause of D1 not connecting at runtime.
#
# FREE TIER capabilities used:
#
#   Pages       — unlimited bandwidth, 500 builds/month
#   D1 (SQLite) — 5M row reads/day, 100k writes/day, 5GB (replace localStorage)
#   KV          — 100k reads/day, 1k writes/day, 1GB storage (API response cache)
#   R2          — 10GB storage (file uploads, exports)
#   Workers AI  — free inference calls (embeddings for vector search)
#   Tunnels     — free (reverse proxy to OpenClaw VPS)
#   Access      — free for ≤50 users (zero-trust auth layer)
#
# ─────────────────────────────────────────────────────

name = "my-control-center"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── This line makes Cloudflare Pages read this file ───
# Without it, ALL bindings below are ignored and D1/KV/R2 won't work.
pages_build_output_dir = ".vercel/output/static"

# ─── D1 Database (cross-device persistent storage) ───
# SETUP: Run `wrangler d1 create mcc-store` and paste the database_id below
[[d1_databases]]
binding = "DB"
database_name = "mcc-store"
database_id = "294c9dc6-880d-43a8-af35-5ec613ee08ba"  # REQUIRED: paste output of `wrangler d1 create mcc-store`

# ─── KV Namespace (API response cache) ───
# SETUP: Run `wrangler kv namespace create CACHE` and paste the id below
[[kv_namespaces]]
binding = "CACHE"
id = "d5ece8caf7b74fa0883ae71f3af2f265"  # REQUIRED: paste output of `wrangler kv namespace create CACHE`

# ─── R2 Bucket (file storage) ───
[[r2_buckets]]
binding = "FILES"
bucket_name = "mcc-files"

# ─── Workers AI (embeddings for vector search) ───
[ai]
binding = "AI"

# ─── Environment Variables ───
[vars]
NEXT_PUBLIC_API_BASE = "/api"
MCC_VPS_SSE_URL = "https://bridge.my-control-center.com/chat/stream"
MCC_VPS_CONNECT_URL = "https://bridge.my-control-center.com/agents/connect"
MCC_VPS_HEARTBEAT_URL = "https://bridge.my-control-center.com/agents/heartbeat"
MCC_VPS_SCAN_URL = "https://bridge.my-control-center.com/status"
MCC_VPS_STATUS_URL = "https://bridge.my-control-center.com/status"
