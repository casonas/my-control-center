# ─────────────────────────────────────────────────────
# MCC Cron Worker — Cloudflare Worker with scheduled triggers
# ─────────────────────────────────────────────────────
# Deploy: cd worker && npx wrangler deploy
# Test:   cd worker && npx wrangler dev --test-scheduled
# ─────────────────────────────────────────────────────

name = "mcc-cron"
account_id = "59a02b48365bacfcbfb54d515cc49dbe"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# ─── D1 Database (same as Pages) ───
[[d1_databases]]
binding = "DB"
database_name = "mcc-store"
database_id = "294c9dc6-880d-43a8-af35-5ec613ee08ba"

# ─── Cron Triggers (5 expressions — fan-out dispatcher) ───
# Each trigger fans out to multiple sub-jobs via FANOUT_MAP in index.ts.
# Sub-jobs have per-subjob timeout, failure isolation, and individual
# cron_runs logging as "pulse:<subjob_name>_<userId>".
# Adjust frequencies to stay within free-tier limits (100k req/day).
[triggers]
crons = [
  "*/30 * * * *",        # Every 30 min: stocks/jobs/sports refresh
  "0 * * * *",           # Hourly: research_scan, stocks_news_scan
  "0 */3 * * *",         # Every 3 hours: industry_radar_refresh
  "0 6 * * *",           # Daily 6am UTC: lesson_plan_refresh, skills_radar_scan, memory_summarize
  "0 13 * * 1-5",        # Weekday 8am ET: premarket_outliers
]

# ─── Environment Variables ───
# Set CRON_SECRET in Cloudflare dashboard → Worker → Settings → Variables
# Do NOT put secrets in this file.
[vars]
WORKER_NAME = "mcc-cron"
MCC_API_BASE_URL = "https://my-control-center.pages.dev"
